services:
  app:
    build: .
    container_name: eventsy_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "EventSY"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: event_booking
      DB_USERNAME: eventsy
      DB_PASSWORD: secret
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: eventsy_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: event_booking
      MYSQL_USER: eventsy
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "eventsy", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
